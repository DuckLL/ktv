services:
  ktv:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./cache:/app/cache
      - ./ktv.db:/app/ktv.db
      # Persist demucs model weights across rebuilds (/home/app/.cache/torch)
      - demucs-models:/home/app/.cache/torch
    restart: unless-stopped

volumes:
  demucs-models:
